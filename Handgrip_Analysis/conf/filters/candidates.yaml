filters:
  - name: identity
    type: identity

  - name: butter_lowpass_8hz
    type: butter_lowpass
    order: 2
    cutoff_hz: 8.0

  - name: butter_lowpass_10hz
    type: butter_lowpass
    order: 2
    cutoff_hz: 10.0

  - name: butter_lowpass_12hz
    type: butter_lowpass
    order: 2
    cutoff_hz: 12.0

  - name: butter_lowpass_15hz
    type: butter_lowpass
    order: 2
    cutoff_hz: 15.0

  - name: notch_45p95hz
    type: notch
    freq_hz: 45.9473
    q: 20.0

  - name: notch_45p95hz_then_lowpass_12hz
    type: chain
    steps:
      - type: notch
        freq_hz: 45.9473
        q: 20.0
      - type: butter_lowpass
        order: 2
        cutoff_hz: 12.0

  - name: highpass_0p05hz
    type: butter_highpass
    order: 2
    cutoff_hz: 0.05

  - name: highpass_0p10hz
    type: butter_highpass
    order: 2
    cutoff_hz: 0.10

  - name: bandpass_0p05_12hz
    type: butter_bandpass
    order: 2
    low_hz: 0.05
    high_hz: 12.0

  - name: bandpass_0p10_12hz
    type: butter_bandpass
    order: 2
    low_hz: 0.10
    high_hz: 12.0
