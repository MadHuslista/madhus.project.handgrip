# Handgrip_Analysis Stage 6 extended filter candidates
#
# Active production candidate set for the existing Handgrip_Analysis trial data.
# The active `filters:` list is intentionally restricted to filters that the
# current Stage 6 report can evaluate and translate into an LSL_Bridge-oriented
# recommendation path: identity, second-order Butterworth low-pass, and causal
# one-pole low-pass.
#
# Existing data basis:
# - Target capture sample rate observed in the included trials: ~100 Hz.
# - Stage 4 handgrip dynamics are relatively slow compared with Nyquist
#   (observed 10-90% rise times are roughly 0.4-3.1 s across existing trials).
# - Stage 2 rest data show high-frequency noise in the 30-49 Hz assessment band,
#   but the narrowband peaks are not sufficiently stable across sessions to make
#   notch filtering the primary active family.
#
# Practical recommendation:
# - Treat the 4-12 Hz Butterworth candidates as the main decision region.
# - Keep 15-25 Hz Butterworth candidates as fidelity-biased alternatives.
# - Use one-pole candidates to compare causal/live behavior against the
#   zero-phase offline Butterworth review.
# - Keep identity as a mandatory baseline.

metadata:
  schema_version: 1
  intended_stage: stage6
  generated_for: Handgrip_Analysis existing 20260402 and 20260512 trials
  target_sampling_rate_hz_observed: 100.0
  primary_search_region_hz: [4.0, 12.0]
  fidelity_biased_region_hz: [15.0, 25.0]
  lsl_bridge_primary_deployable_family: butter_lowpass_order2
  notes:
    - "This file is production-biased: active candidates avoid diagnostic high-pass/band-pass filters that could corrupt absolute force baselines."
    - "Notch filters are kept in metadata below as diagnostic candidates, but not included in the active filters list because current Stage 2 evidence does not show a stable replicated line component."
    - "If future Stage 5 interference trials prove a stable narrowband line, move the relevant notch or notch+lowpass diagnostic candidate into `filters:` and re-run Stage 6."

filters:
  # -------------------------------------------------------------------------
  # Baseline / no-op
  # -------------------------------------------------------------------------
  - name: identity
    type: identity
    rationale: "Baseline reference; required to quantify whether filtering improves enough to justify deployment."

  # -------------------------------------------------------------------------
  # Primary family: order-2 Butterworth low-pass.
  # These are zero-phase during offline Stage 6 review; the selected order-2
  # Butterworth candidate can be translated into an LSL_Bridge second-order
  # low-pass recommendation.
  # -------------------------------------------------------------------------
  - name: butter_lowpass_3hz
    type: butter_lowpass
    order: 2
    cutoff_hz: 3.0
    family: primary_lowpass_sweep
    deployment_priority: aggressive_smoothing

  - name: butter_lowpass_4hz
    type: butter_lowpass
    order: 2
    cutoff_hz: 4.0
    family: primary_lowpass_sweep
    deployment_priority: aggressive_smoothing

  - name: butter_lowpass_5hz
    type: butter_lowpass
    order: 2
    cutoff_hz: 5.0
    family: primary_lowpass_sweep
    deployment_priority: balanced_noise_reduction

  - name: butter_lowpass_6hz
    type: butter_lowpass
    order: 2
    cutoff_hz: 6.0
    family: primary_lowpass_sweep
    deployment_priority: balanced_noise_reduction

  - name: butter_lowpass_7hz
    type: butter_lowpass
    order: 2
    cutoff_hz: 7.0
    family: primary_lowpass_sweep
    deployment_priority: balanced_noise_reduction

  - name: butter_lowpass_8hz
    type: butter_lowpass
    order: 2
    cutoff_hz: 8.0
    family: primary_lowpass_sweep
    deployment_priority: balanced_default_region

  - name: butter_lowpass_9hz
    type: butter_lowpass
    order: 2
    cutoff_hz: 9.0
    family: primary_lowpass_sweep
    deployment_priority: balanced_default_region

  - name: butter_lowpass_10hz
    type: butter_lowpass
    order: 2
    cutoff_hz: 10.0
    family: primary_lowpass_sweep
    deployment_priority: balanced_default_region

  - name: butter_lowpass_12hz
    type: butter_lowpass
    order: 2
    cutoff_hz: 12.0
    family: primary_lowpass_sweep
    deployment_priority: fidelity_biased

  - name: butter_lowpass_15hz
    type: butter_lowpass
    order: 2
    cutoff_hz: 15.0
    family: fidelity_biased_lowpass_sweep
    deployment_priority: fidelity_biased

  - name: butter_lowpass_18hz
    type: butter_lowpass
    order: 2
    cutoff_hz: 18.0
    family: fidelity_biased_lowpass_sweep
    deployment_priority: fidelity_biased

  - name: butter_lowpass_20hz
    type: butter_lowpass
    order: 2
    cutoff_hz: 20.0
    family: fidelity_biased_lowpass_sweep
    deployment_priority: fidelity_biased

  - name: butter_lowpass_25hz
    type: butter_lowpass
    order: 2
    cutoff_hz: 25.0
    family: fidelity_biased_lowpass_sweep
    deployment_priority: weak_smoothing_control

  # -------------------------------------------------------------------------
  # Causal live-filter family: one-pole low-pass.
  # These intentionally model real-time causal behavior. Compare the Stage 6
  # timing/shape metrics against Butterworth candidates before deployment.
  # -------------------------------------------------------------------------
  - name: one_pole_lowpass_4hz
    type: one_pole_lowpass
    cutoff_hz: 4.0
    family: causal_live_lowpass

  - name: one_pole_lowpass_6hz
    type: one_pole_lowpass
    cutoff_hz: 6.0
    family: causal_live_lowpass

  - name: one_pole_lowpass_8hz
    type: one_pole_lowpass
    cutoff_hz: 8.0
    family: causal_live_lowpass

  - name: one_pole_lowpass_10hz
    type: one_pole_lowpass
    cutoff_hz: 10.0
    family: causal_live_lowpass

  - name: one_pole_lowpass_12hz
    type: one_pole_lowpass
    cutoff_hz: 12.0
    family: causal_live_lowpass

  - name: one_pole_lowpass_15hz
    type: one_pole_lowpass
    cutoff_hz: 15.0
    family: causal_live_lowpass

  - name: one_pole_lowpass_20hz
    type: one_pole_lowpass
    cutoff_hz: 20.0
    family: causal_live_lowpass

# These are intentionally not active candidates. They are documented here so the
# design decision is explicit and reproducible.
diagnostic_candidates_not_active:
  reason: "The current Stage 6 selector does not enforce deployment metadata. Leaving diagnostic filters in the active candidate list can cause the final report to select a filter that is not appropriate for the primary LSL_Bridge force path."
  candidates:
    - name: moving_average_3samples
      type: moving_average
      window_samples: 3
      reason_not_active: "Useful embedded baseline, but not directly mapped by the current LSL_Bridge recommendation path."
    - name: moving_average_5samples
      type: moving_average
      window_samples: 5
      reason_not_active: "Useful embedded baseline, but not directly mapped by the current LSL_Bridge recommendation path."
    - name: median_3samples
      type: median
      kernel_size: 3
      reason_not_active: "Useful for impulse rejection, but can win the current combined score while not being the intended LSL_Bridge deployable family."
    - name: median_5samples
      type: median
      kernel_size: 5
      reason_not_active: "Useful for impulse rejection, but can win the current combined score while not being the intended LSL_Bridge deployable family."
    - name: notch_45p85hz_q20
      type: notch
      freq_hz: 45.85
      q: 20.0
      reason_not_active: "Only one existing rest session shows a strong high-band peak near this frequency; keep inactive until Stage 5/replicated interference evidence confirms it."
    - name: notch_45p85hz_q20_then_lowpass_8hz
      type: chain
      steps:
        - type: notch
          freq_hz: 45.85
          q: 20.0
        - type: butter_lowpass
          order: 2
          cutoff_hz: 8.0
      reason_not_active: "Enable only if the notch target is confirmed as stable across repeated trials."
    - name: highpass_0p05hz_diagnostic
      type: butter_highpass
      order: 2
      cutoff_hz: 0.05
      reason_not_active: "Diagnostic only; can remove true low-frequency force/baseline content."
    - name: bandpass_0p05_10hz_diagnostic
      type: butter_bandpass
      order: 2
      low_hz: 0.05
      high_hz: 10.0
      reason_not_active: "Diagnostic only; can remove true low-frequency force/baseline content."
