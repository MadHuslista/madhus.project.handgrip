# Handgrip_Analysis Stage 6 production-real-time filter candidates
# Active filters are intentionally restricted to filters that map directly to
# LSL_Bridge processing.filters and are evaluated with the same causal per-sample
# implementation used for production streaming.

metadata:
  schema_version: 2
  intended_stage: stage6
  generated_for: Handgrip_Analysis existing 20260402 and 20260512 trials
  target_sampling_rate_hz_observed: 100.0
  primary_search_region_hz:
  - 4.0
  - 12.0
  fidelity_biased_region_hz:
  - 15.0
  - 25.0
  lsl_bridge_primary_deployable_family: butterworth_lowpass_2nd
  notes:
  - 'This file is production-biased: active candidates avoid diagnostic high-pass/band-pass filters that could corrupt absolute
    force baselines.'
  - Notch filters are kept in metadata below as diagnostic candidates, but not included in the active filters list because
    current Stage 2 evidence does not show a stable replicated line component.
  - If future Stage 5 interference trials prove a stable narrowband line, move the relevant notch or notch+lowpass diagnostic
    candidate into `filters:` and re-run Stage 6.
  - Active filters use LSL_Bridge production-real-time type names and causal per-sample semantics.
  production_realtime_contract: active filters must map 1:1 to LSL_Bridge processing.filters entries
