diagnostic_candidates_not_active:
  reason: Diagnostic/offline filters remain inactive because Stage 6 active candidates must be directly deployable as LSL_Bridge
    production real-time filters.
  candidates:
  - name: moving_average_3samples
    type: moving_average
    window_samples: 3
    reason_not_active: Useful embedded baseline, but not directly mapped by the current LSL_Bridge recommendation path.
  - name: moving_average_5samples
    type: moving_average
    window_samples: 5
    reason_not_active: Useful embedded baseline, but not directly mapped by the current LSL_Bridge recommendation path.
  - name: median_3samples
    type: median
    kernel_size: 3
    reason_not_active: Useful for impulse rejection, but can win the current combined score while not being the intended LSL_Bridge
      deployable family.
  - name: median_5samples
    type: median
    kernel_size: 5
    reason_not_active: Useful for impulse rejection, but can win the current combined score while not being the intended LSL_Bridge
      deployable family.
  - name: notch_45p85hz_q20
    type: notch
    freq_hz: 45.85
    q: 20.0
    reason_not_active: Only one existing rest session shows a strong high-band peak near this frequency; keep inactive until
      Stage 5/replicated interference evidence confirms it.
  - name: notch_45p85hz_q20_then_lowpass_8hz
    type: chain
    steps:
    - type: notch
      freq_hz: 45.85
      q: 20.0
    - type: butter_lowpass
      order: 2
      cutoff_hz: 8.0
    reason_not_active: Enable only if the notch target is confirmed as stable across repeated trials.
  - name: highpass_0p05hz_diagnostic
    type: butter_highpass
    order: 2
    cutoff_hz: 0.05
    reason_not_active: Diagnostic only; can remove true low-frequency force/baseline content.
  - name: bandpass_0p05_10hz_diagnostic
    type: butter_bandpass
    order: 2
    low_hz: 0.05
    high_hz: 10.0
    reason_not_active: Diagnostic only; can remove true low-frequency force/baseline content.
