mode: live

# Two-native-stream viewer. It subscribes independently to the target and
# reference streams and aligns them only by their LSL sample timestamps.
streams:
  target:
    name: HandgripTarget
    stype: Force
    source_id: null
    buffer_samples: 1600
    acquisition_delay: 0.01
    timeout: 5.0
  reference:
    name: HandgripReference
    stype: Force
    source_id: rs485-acquisition-board-1
    buffer_seconds: 12.0
    acquisition_delay: 0.01
    timeout: 5.0
    expected_rate_hz: 500.0

channels:
  target:
    clock_label: device_clock_us
    raw_label: grip_force_raw
    filtered_label: grip_force_filtered
  reference:
    clock_label: rs485_clock
    raw_label: rs485_raw

viewer:
  window_seconds: 10.0
  target_window_samples: 1600
  reference_window_extra_s: 1.0
  expected_target_rate_hz: 100.0
  refresh_s: 0.05
  force_unit_label: N
  dt_unit_label: ms
  xy_correlation:
    # false = adaptive autoscale on every refresh.
    # true  = only zoom out: preserve the largest observed XY axis span.
    lock_max_span: false
    toggle_key: x
    # XY uses a connected LineCollection instead of point markers. Alpha is
    # computed from sample age across viewer.window_seconds, so the oldest
    # segments fade out while the newest segments remain prominent.
    line_width: 1.6
    color: red
    alpha_old: 0.12
    alpha_new: 0.92
    # raw is recommended for calibration visualization; filtered remains
    # available for display-only experiments.
    target_signal: raw
    # Display-only alignment for the XY graph. The native stream buffers,
    # LSL/XDF timestamps, and calibration data are not modified.
    #
    # tail_aligned_lsl keeps the DSP-correct reference→target interpolation but
    # first removes any live stream-tail offset between the two inlets. This is
    # the correct live-view behavior when the time-series panels are responsive
    # but the XY graph appears delayed by a fixed transport/timestamp offset.
    # Use raw_lsl for strict timestamp inspection.
    time_alignment:
      mode: tail_aligned_lsl       # tail_aligned_lsl | manual | raw_lsl
      manual_reference_shift_s: 0.0
      # null means "use viewer.window_seconds" as the max allowed shift.
      # This avoids the previous 1 s cap that could not correct an observed ~5 s lag.
      max_auto_shift_s: null
      min_auto_shift_s: 0.0
      # Large changes snap immediately; small residual jitter can be smoothed.
      snap_threshold_s: 0.250
      smoothing_alpha: 1.0
  controls:
    clear_key: c
    pause_key: p

# Alignment policy used only for visualization/calibration views. The raw LSL
# streams remain native-rate; reference samples are interpolated to target sample
# timestamps only inside the viewer.
alignment:
  interpolation: linear
  # For a 500 Hz reference, nominal spacing is 2 ms. This gate rejects real
  # reference dropouts after tail alignment; it does not assume 1:1 samples.
  max_reference_gap_s: 0.020
  allow_extrapolation: false

reference:
  # Preferred replay inputs after bridge refactor.
  target_csv_path: ./data/target_handgrip_samples.csv
  reference_csv_path: ./data/reference_rs485_samples.csv
  xdf_path: null

  # Legacy fused CSV compatibility fallback.
  csv_path: null

replay:
  speed: 1.0
  loop: false
  start_offset_s: 0.0

logging:
  level: INFO

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
