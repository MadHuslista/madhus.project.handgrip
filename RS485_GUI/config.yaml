hydra:
  run:
    dir: .
  output_subdir: null

app:
  log_level: INFO
  worker_join_timeout_s: 1.5

ui:
  page_title: High-Speed Acquisition Instrument GUI
  host: 127.0.0.1
  port: 8088
  refresh_interval_s: 0.2
  plot_height_px: 360
  log_height_px: 380
  event_log_height_px: 180
  visible_log_entries: 0  # 0 = show all retained entries and use scrollbar
  visible_event_entries: 0  # 0 = show all retained entries and use scrollbar
  max_retained_log_entries: 1000
  max_retained_event_entries: 2000
  max_plot_points: 10000
  light_mode: true

logger:
  enabled: true
  directory: ./logs
  write_mode: append  # append | overwrite
  raw_signal_filename: raw_signal.ndjson
  interpreted_signal_filename: interpreted_signal.ndjson
  gui_signal_filename: gui_signal.csv

serial:
  default_port: ""
  default_baudrate: 460800
  default_parity: N
  default_stopbits: 1
  bytesize: 8
  timeout_s: 0.2
  inter_frame_gap_s: 0.01
  port_hints:
    - USB
    - RS485
    - FTDI
    - CH340
    - CP210
    - PL2303
    - ttyUSB
    - ttyACM

device:
  mode: active_send  # modbus_rtu | active_send
  slave_address: 1
  active_send_frequency_code: 8 # 500 Hz
  poll_interval_s: 0.002  # 500 Hz fallback cadence when mode=modbus_rtu
  error_backoff_s: 0.25

active_send:
  default_parser_profile: hex_s32  # line_ascii_auto | line_ascii_float | line_ascii_csv | hex_s32
  default_numeric_index: 0
  default_hex_word_endianness: big
  read_timeout_s: 0.5
  read_chunk_bytes: 256
  max_binary_frame_bytes: 64
