defaults:
  - _self_

schema:
  version: handgrip_lsl_bridge.v2
  description: >-
    Publishes two native LSL streams with canonical channel labels expected by Handgrip_Calibration.

session:
  # Optional operator/session identifier propagated into LSL stream metadata.
  session_id: null
  component_id: LSL_Bridge

# Two-native-stream architecture:
# - target stream: Arduino/HX711 handgrip, native irregular ~93-100 Hz
# - reference stream: RS485 acquisition board, native regular 500 Hz
streams:
  target:
    enabled: true
    name: HandgripTarget
    type: Force
    source_id: null
    manufacturer: Arduino/HX711
    device_name: HandgripTarget
    nominal_srate: 0.0
    payload_schema: D2
    chunk_size: 1              # LSL StreamOutlet chunk_size for target outlet
    schema: handgrip_target_stream.v2   # LSL stream schema version string
    channels:
      seq:
        label: seq
        type: Sequence
        unit: count
      device_clock_us:
        label: device_clock_us
        type: Time
        unit: us
      raw_count:
        label: target_raw_count
        type: ADCCount
        unit: count
      current_units:
        label: target_current_units
        type: Force
        unit: N
      filtered_units:
        label: target_filtered_units
        type: Force
        unit: N
      status:
        label: target_status
        type: Status
        unit: bitfield

  reference:
    enabled: true
    name: HandgripReference
    type: Force
    source_id: rs485-acquisition-board-1
    manufacturer: RS485 Acquisition Board
    device_name: HighSpeedAcquisitionInstrument
    nominal_srate: 500.0
    chunk_size: 1              # LSL StreamOutlet chunk_size for reference outlet
    schema: handgrip_reference_stream.v2  # LSL stream schema version string
    channels:
      seq:
        label: seq
        type: Sequence
        unit: count
      clock:
        label: reference_clock_s
        type: Time
        unit: s
      force:
        label: reference_force_N
        type: Force
        unit: N
      status:
        label: reference_status
        type: Status
        unit: bitfield

component_events:
  enabled: true
  name: HandgripComponentEvents
  type: Markers
  source_id: handgrip-lsl-bridge-events
  schema: handgrip_component_event.v1   # LSL marker payload schema version string

rs485_ipc:
  enabled: true
  transport: zmq_sub
  connect: tcp://127.0.0.1:5557
  topic: rs485.measurement.v1
  receive_hwm: 5000
  log_status_every_s: 5.0
  expected_schema: rs485.measurement.v1  # Schema string enforced on every IPC message
  poll_interval_s: 0.001                 # Sleep duration when ZMQ queue is empty
  error_backoff_s: 0.05                  # Sleep duration after a ZMQError
  log_malformed_every_n: 100            # Log dropped malformed IPC messages every N occurrences

serial:
  port: /dev/ttyUSB1
  baudrate: 115200
  timeout_s: 0.25
  reconnect_backoff_s: 2.0
  startup_settle_s: 2.0
  max_line_bytes: 256
  # Constant correction for known serial transport delay. Keep 0 unless measured.
  transport_latency_s: 0.0

# LSL sample timestamps are the synchronization authority. Device timestamps are
# kept as diagnostic channels. Recommended first implementation uses Arduino
# device-clock deltas anchored to the first host LSL receive time.
target_timestamping:
  # host_receive is lower-risk when firmware micros() quality is unknown.
  # device_clock_anchor preserves native device cadence, while max_anchor_drift_s
  # prevents live XY reference->target interpolation from accumulating visible
  # delay if the firmware/device clock walks away from host LSL time.
  policy: device_clock_anchor
  reset_on_nonmonotonic: true
  max_gap_s: 1.0
  max_anchor_drift_s: 0.050
  monotonic_epsilon_s: 0.000000001

protocol:
  delimiter: ","
  data_prefix: D2
  metadata_prefix: M2
  accepted_numeric_regex: '[-+]?(?:\d+(?:\.\d*)?|\.\d+)(?:[eE][-+]\d+)?|nan|NaN|inf|-inf|INF|-INF'

processing:
  # Filter target_current_units for display/QA only. Do not fit calibration on this channel.
  module: lsl_bridge.core.filter
  timestamp_source: device_clock_us
  filters:
    - type: butterworth_lowpass_2nd
      name: butter_lowpass_9hz
      sample_rate_hz: 100.0
      cutoff_hz: 9.0
      q: 0.7071067811865475
      reset_on_gap_s: 1.0
      min_dt_s: 0.000001

csv:
  target:
    enabled: true
    path: LSL_Bridge/data/target_handgrip_samples_v2.csv
    append: false
    flush_every_n_rows: 1
  reference:
    enabled: true
    path: LSL_Bridge/data/reference_rs485_samples_v2.csv
    append: false
    flush_every_n_rows: 25

logging:
  level: INFO
  file: LSL_Bridge/logs/lsl_bridge.log          # Path for FileHandler; set to null to disable file logging
  format: "[%(asctime)s][%(name)s][%(levelname)s] - %(message)s"
  log_every_n_samples: 200
  log_parse_errors_every_n: 20

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
