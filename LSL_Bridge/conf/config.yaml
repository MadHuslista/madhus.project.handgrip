defaults:
  - _self_

stream:
  name: UnifiedHandgripRS485
  type: Force
  source_id: null
  manufacturer: Arduino+RS485
  device_name: Handgrip+AcquisitionBoard

  # Arduino / handgrip channels
  value_unit: g
  clock_unit: us
  clock_channel_label: device_clock_us
  raw_channel_label: grip_force_raw
  filtered_channel_label: grip_force_filtered
  clock_channel_type: Time
  raw_channel_type: Force
  filtered_channel_type: Force

  # RS485 acquisition-board channels
  rs485_value_unit: N
  rs485_clock_unit: s
  rs485_raw_channel_label: rs485_raw
  rs485_clock_channel_label: rs485_clock
  rs485_raw_channel_type: Force
  rs485_clock_channel_type: Time

rs485_ipc:
  enabled: true
  transport: zmq_sub
  connect: tcp://127.0.0.1:5557
  topic: rs485.measurement.v1

  receive_hwm: 5000
  buffer_max_frames: 5000

  # Fusion rule: bridge publishes one unified LSL sample per Arduino sample.
  # It selects the closest RS485 frame inside [Arduino timestamp - max_age_s,
  # Arduino timestamp + max_future_s]. Active-Send is delivered in short bursts,
  # so this window must tolerate the burst interval plus OS scheduling jitter.
  max_age_s: 0.200
  max_future_s: 0.050

  # nan makes missing/stale RS485 data explicit without crashing Arduino acquisition.
  missing_policy: nan       # nan | hold_last
  stale_policy: nan         # nan | hold_last

  log_status_every_s: 5.0

serial:
  port: /dev/ttyUSB0
  baudrate: 115200
  timeout_s: 0.25
  reconnect_backoff_s: 2.0
  startup_settle_s: 2.0
  max_line_bytes: 256
  transport_latency_s: 0.0

protocol:
  mode: auto            # auto | tagged_csv | simple_csv | legacy_pair_lines
  delimiter: ","
  tagged_prefix: D
  expect_crc16: false
  accepted_numeric_regex: '[-+]?(?:\d+(?:\.\d*)?|\.\d+)(?:[eE][-+]?\d+)?'

processing:
  module: filter
  timestamp_source: device_clock_us   # device_clock_us | lsl
  filters:
    - type: butterworth_lowpass_2nd
      name: characterization_lowpass_15hz
      sample_rate_hz: 100.0
      cutoff_hz: 15.0
      q: 0.7071067811865476
      reset_on_gap_s: 1.0
      min_dt_s: 0.000001

csv:
  path: ./data/handgrip_samples.csv
  append: true
  flush_every_n_rows: 1

logging:
  level: INFO
  log_every_n_samples: 200
  log_parse_errors_every_n: 20

hydra:
  run:
    dir: .
  job:
    chdir: false
