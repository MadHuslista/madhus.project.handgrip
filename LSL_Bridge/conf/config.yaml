defaults:
  - _self_

stream:
  name: ArduinoHandgrip
  type: Force
  source_id: null
  manufacturer: Arduino
  device_name: Handgrip
  value_unit: g
  clock_unit: us
  clock_channel_label: device_clock_us
  raw_channel_label: grip_force_raw
  filtered_channel_label: grip_force_filtered
  clock_channel_type: Time
  raw_channel_type: Force
  filtered_channel_type: Force

serial:
  port: /dev/ttyACM0
  baudrate: 115200
  timeout_s: 0.25
  reconnect_backoff_s: 2.0
  startup_settle_s: 2.0
  max_line_bytes: 256
  transport_latency_s: 0.0

protocol:
  mode: auto            # auto | tagged_csv | simple_csv | legacy_pair_lines
  delimiter: ","
  tagged_prefix: D
  expect_crc16: false
  accepted_numeric_regex: '[-+]?(?:\d+(?:\.\d*)?|\.\d+)(?:[eE][-+]?\d+)?'

processing:
  module: filter
  timestamp_source: device_clock_us   # device_clock_us | lsl
  filters:
    - type: lowpass_1pole
      name: lowpass_1hz
      cutoff_hz: 1.0
      reset_on_gap_s: 1.0
      min_dt_s: 0.000001
    - type: drift_corrector
      name: slow_drift_corrector
      baseline_cutoff_hz: 0.02
      rest_band: 5.0
      stable_slope_threshold_per_s: 5.0
      warmup_samples: 20
      reset_on_gap_s: 1.0
      min_dt_s: 0.000001

csv:
  path: ./data/handgrip_samples.csv
  append: true
  flush_every_n_rows: 1

logging:
  level: INFO
  log_every_n_samples: 200
  log_parse_errors_every_n: 20

hydra:
  run:
    dir: .
  job:
    chdir: false
