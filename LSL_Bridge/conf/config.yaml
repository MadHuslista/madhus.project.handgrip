defaults:
  - _self_

# Two-native-stream architecture:
# - target stream: Arduino/HX711 handgrip, native irregular ~93-100 Hz
# - reference stream: RS485 acquisition board, native regular 500 Hz
streams:
  target:
    enabled: true
    name: HandgripTarget
    type: Force
    source_id: null
    manufacturer: Arduino/HX711
    device_name: HandgripTarget
    nominal_srate: 0.0
    channels:
      device_clock_us:
        label: device_clock_us
        type: Time
        unit: us
      raw:
        label: grip_force_raw
        type: Force
        unit: N
      filtered:
        label: grip_force_filtered
        type: Force
        unit: N

  reference:
    enabled: true
    name: HandgripReference
    type: Force
    source_id: rs485-acquisition-board-1
    manufacturer: RS485 Acquisition Board
    device_name: HighSpeedAcquisitionInstrument
    nominal_srate: 500.0
    channels:
      clock:
        label: rs485_clock
        type: Time
        unit: s
      raw:
        label: rs485_raw
        type: Force
        unit: N

# Optional compatibility stream is intentionally disabled. Calibration and the
# viewer should use the two native streams above, not a fused 5-channel stream.
legacy_unified_stream:
  enabled: false
  name: UnifiedHandgripRS485_DERIVED_LEGACY

rs485_ipc:
  enabled: true
  transport: zmq_sub
  connect: tcp://127.0.0.1:5557
  topic: rs485.measurement.v1
  receive_hwm: 5000
  log_status_every_s: 5.0

serial:
  port: /dev/ttyUSB1
  baudrate: 115200
  timeout_s: 0.25
  reconnect_backoff_s: 2.0
  startup_settle_s: 2.0
  max_line_bytes: 256
  # Constant correction for known serial transport delay. Keep 0 unless measured.
  transport_latency_s: 0.0

# LSL sample timestamps are the synchronization authority. Device timestamps are
# kept as diagnostic channels. Recommended first implementation uses Arduino
# device-clock deltas anchored to the first host LSL receive time.
target_timestamping:
  policy: device_clock_anchor    # host_receive | device_clock_anchor | device_clock_affine
  reset_on_nonmonotonic: true
  max_gap_s: 1.0

protocol:
  mode: auto            # auto | tagged_csv | simple_csv | legacy_pair_lines
  delimiter: ","
  tagged_prefix: D
  expect_crc16: false
  accepted_numeric_regex: '[-+]?(?:\d+(?:\.\d*)?|\.\d+)(?:[eE][-+]?\d+)?'

processing:
  module: filter
  timestamp_source: device_clock_us   # device_clock_us | lsl
  filters:
    - type: butterworth_lowpass_2nd
      name: characterization_lowpass_15hz
      sample_rate_hz: 100.0
      cutoff_hz: 15.0
      q: 0.7071067811865476
      reset_on_gap_s: 1.0
      min_dt_s: 0.000001

csv:
  target:
    enabled: true
    path: ./data/target_handgrip_samples.csv
    append: true
    flush_every_n_rows: 1
  reference:
    enabled: true
    path: ./data/reference_rs485_samples.csv
    append: true
    flush_every_n_rows: 25

logging:
  level: INFO
  log_every_n_samples: 200
  log_parse_errors_every_n: 20

hydra:
  run:
    dir: .
  job:
    chdir: false
