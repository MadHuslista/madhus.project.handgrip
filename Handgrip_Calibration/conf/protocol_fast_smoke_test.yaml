# Short protocol for software dry-runs with real streams.
# Not intended for final calibration coefficients.

session:
  root_dir: data/calibration
  operator: unknown
  purpose: smoke_test_handgrip_calibration_pipeline
  notes: "Short smoke-test protocol. Do not use coefficients from this run as final calibration."

streams:
  target:
    name: HandgripTarget
    type: Force
    timeout_s: 5.0
    nominal_srate_hz: null
    channel_map:
      raw: [target_raw_count, grip_force_raw, raw, 0]
      filtered: [target_filtered_units, grip_force_filtered, filtered, 1]
      clock: [device_clock_us, target_clock_us, clock, 2]
      seq: [seq, sequence, sample_index]
  reference:
    name: HandgripReference
    type: Force
    timeout_s: 5.0
    nominal_srate_hz: 500
    channel_map:
      raw: [reference_force_N, rs485_raw, raw, 0]
      clock: [rs485_clock, reference_clock_us, clock, 1]
      seq: [seq, sequence, sample_index]

markers:
  emit_lsl: true
  write_ndjson: true

protocol:
  name: smoke_test_static_staircase_v1
  warmup_s: 0
  prompt_operator: true
  baseline:
    duration_s: 2
    require_stable: false
  preload:
    enabled: false
    cycles: 0
    max_force_N: 0
  holds:
    levels_N: [0, 20, 40, 20, 0]
    hold_duration_s: 2
    stable_window_s: 1
    repeats: 1
    auto_accept: false
  dynamic_validation:
    slow_ramps: 0
    fast_squeezes: 0

quality:
  reference_expected_hz: 500
  reference_min_hz: 450
  reference_max_gap_s: 0.050
  target_expected_hz_min: 50
  target_expected_hz_max: 130
  target_max_gap_s: 0.200
  max_hold_reference_std_N: 2.0
  max_hold_reference_slope_N_per_s: 2.0
  max_baseline_drift_N_per_min: 2.0
  min_hold_target_samples: 5
  min_hold_reference_samples: 20
  quality_emit_period_s: 1.0

fit:
  primary_model: affine
  target_signal: raw
  reference_signal: raw
  reference_scale: 1.0
  reference_offset: 0.0
  operating_range_N: 50.0
  residual_threshold_percent_operating_range: 2.0
  weighted_by_reference_noise: false
  export_firmware_constants: true
