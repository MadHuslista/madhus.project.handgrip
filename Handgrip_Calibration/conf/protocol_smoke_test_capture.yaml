session:
  root_dir: data/calibration
  operator: unknown
  purpose: smoke_test_capture_end_to_end_pipeline
  notes: Minimal capture for pipeline smoke testing. Do not use coefficients from this run in production.
streams:
  target:
    name: HandgripTarget
    type: Force
    timeout_s: 5.0
    nominal_srate_hz: null
    channel_map:
      seq:
      - seq
      - 0
      clock:
      - device_clock_us
      - 1
      raw:
      - target_raw_count
      - 2
      filtered:
      - target_filtered_units
      - 4
      current_units:
      - target_current_units
      - 3
      status:
      - target_status
      - 5
  reference:
    name: HandgripReference
    type: Force
    timeout_s: 5.0
    nominal_srate_hz: 500
    channel_map:
      seq:
      - seq
      - 0
      clock:
      - reference_clock_s
      - 1
      raw:
      - reference_force_N
      - 2
      status:
      - reference_status
      - 3
markers:
  emit_lsl: true
  write_ndjson: true
protocol:
  name: smoke_test_capture_v1
  warmup_s: 0
  prompt_operator: true
  baseline:
    duration_s: 2
    require_stable: false
  preload:
    enabled: false
    cycles: 0
    max_force_N: 0
  holds:
    levels_N:
    - 0
    - 20
    - 40
    - 20
    - 0
    hold_duration_s: 2
    stable_window_s: 1
    repeats: 1
    auto_accept: false
  dynamic_validation:
    slow_ramps: 0
    fast_squeezes: 0
  type: static_staircase
quality:
  reference_expected_hz: 500
  reference_min_hz: 450
  reference_max_gap_s: 0.05
  target_expected_hz_min: 50
  target_expected_hz_max: 130
  target_max_gap_s: 0.2
  max_hold_reference_std_N: 2.0
  max_hold_reference_slope_N_per_s: 2.0
  max_baseline_drift_N_per_min: 2.0
  min_hold_target_samples: 5
  min_hold_reference_samples: 20
  quality_emit_period_s: 1.0
fit:
  primary_model: auto
  candidate_models:
  - affine_ols
  - affine_wls
  - affine_huber
  - quadratic_wls
  - piecewise_linear_monotone
  - odr_affine
  - hysteresis_affine_diagnostic
  - drift_affine_diagnostic
  target_signal: raw
  reference_signal: raw
  reference_scale: 1.0
  reference_offset: 0.0
  operating_range_N: 50.0
  residual_threshold_percent_operating_range: 2.0
  weighted_by_reference_noise: true
  reference_noise_floor_N: 0.05
  target_raw_noise_floor: 1.0
  export_firmware_constants: true
  selection:
    primary_metric: cv_rmse_N
    max_error_metric: max_abs_error_percent_range
    prefer_simpler_within_cv_rmse_se: true
    require_monotonic: true
    allow_diagnostics_as_primary: false
    cv_group_by: trial_id
    max_cv_folds: 12
    alpha_cv_rmse: 40.0
    beta_max_error: 60.0
    lambda_complexity: 0.15
    monotonicity_violation_penalty: 10.0
    diagnostic_model_penalty: 2.0
    min_cv_coverage_fraction: 0.25
  robust:
    huber_epsilon: 1.35
    huber_delta_N: null
    max_iter: 50
    convergence_tol: 1.0e-09
    min_weight: 0.05
  multipoint:
    min_points: 3
    interpolation: piecewise_linear
    extrapolation: reject
    aggregate_by: target_force_nominal_N
    max_knots: 6
  diagnostics:
    enable_odr_affine: true
    enable_hysteresis: true
    enable_drift: true
    hysteresis_direction_column: direction
    drift_time_column: t_mid_lsl
creep:
  force_levels_N:
  - 0.0
  - 80.0
  - 0.0
  durations_s:
  - 120.0
  - 300.0
  - 300.0
  read_times_s:
  - 30.0
  - 300.0
dynamic:
  ramps:
  - label: slow
    count: 2
    peak_force_N: 100.0
    speed_N_per_s: 5.0
  - label: medium
    count: 0
    peak_force_N: 100.0
    speed_N_per_s: 20.0
  squeezes:
  - label: fast_squeeze
    count: 5
    peak_force_N: 100.0
    rest_s: 3.0
holdout_thresholds:
  max_rmse_N: null
  max_abs_error_N: null
  max_bias_N: null
calibration_artifact:
  enabled: false
  mode: direction_balanced_tail_median
  window:
    source: stable_window
    tail_s: 2.0
  grouping:
    require_both_directions: true
    outlier_method: mad
    max_mad_z: 3.5
