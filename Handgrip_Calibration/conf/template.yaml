# Default configuration for Handgrip_Calibration.
# This file assumes the current architecture: two LSL streams produced by LSL_Bridge.
# It is also compatible with future stream/channel labels added by the planned D2 firmware/bridge extension.

session:
  root_dir: data/calibration
  operator: unknown
  purpose: affine_handgrip_calibration
  notes: "Reference PM58/acquisition-board sensor and Arduino/HX711 target sensor in series."
  # Optional: snapshot upstream configs into each calibration session.
  # Keep these relative paths as examples; missing paths are ignored safely.
  copy_component_configs:
    - ../LSL_Bridge/conf/config.yaml
    - ../LSL_Viewer/conf/config.yaml
    - ../RS485_GUI/config.yaml

streams:
  target:
    name: HandgripTarget
    type: Force
    timeout_s: 5.0
    nominal_srate_hz: null  # target is irregular; do not pretend it is exactly fixed-rate.
    channel_map:
      raw: [target_raw_count, grip_force_raw, raw, 0]
      filtered: [target_filtered_units, grip_force_filtered, filtered, 1]
      clock: [device_clock_us, target_clock_us, clock, 2]
      seq: [seq, sequence, sample_index]

  reference:
    name: HandgripReference
    type: Force
    timeout_s: 5.0
    nominal_srate_hz: 500
    channel_map:
      raw: [reference_force_N, rs485_raw, raw, 0]
      clock: [rs485_clock, reference_clock_us, clock, 1]
      seq: [seq, sequence, sample_index]

markers:
  stream_name: HandgripCalibrationMarkers
  stream_type: Markers
  source_id_prefix: handgrip-calibration
  emit_lsl: true
  write_ndjson: true

protocol:
  name: static_staircase_affine_v1
  warmup_s: 0
  prompt_operator: true

  baseline:
    duration_s: 10
    require_stable: true

  preload:
    enabled: true
    cycles: 3
    max_force_N: 100

  holds:
    levels_N: [0, 10, 20, 40, 60, 80, 100, 80, 60, 40, 20, 10, 0]
    hold_duration_s: 5
    stable_window_s: 3
    repeats: 2
    auto_accept: false

  dynamic_validation:
    slow_ramps: 2
    fast_squeezes: 5

quality:
  reference_expected_hz: 500
  reference_min_hz: 495
  reference_max_gap_s: 0.020
  target_expected_hz_min: 85
  target_expected_hz_max: 105
  target_max_gap_s: 0.100
  max_hold_reference_std_N: 0.5
  max_hold_reference_slope_N_per_s: 0.2
  max_baseline_drift_N_per_min: 0.5
  min_hold_target_samples: 20
  min_hold_reference_samples: 100
  quality_emit_period_s: 1.0

fit:
  primary_model: affine
  target_signal: raw
  reference_signal: raw
  # Use these only if the reference CSV raw column is not already Newtons.
  reference_scale: 1.0
  reference_offset: 0.0
  operating_range_N: 100.0
  residual_threshold_percent_operating_range: 0.5
  weighted_by_reference_noise: false
  export_firmware_constants: true
